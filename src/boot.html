<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Maze — Booting</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 100vw; height: 100vh;
      background: #000;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
      overflow: hidden;
      user-select: none;
    }

    .logo-container {
      display: flex; flex-direction: column;
      align-items: center; gap: 48px;
      animation: fadeIn 0.8s ease forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }

    .maze-logo {
      width: 96px; height: 96px;
      position: relative;
    }

    .maze-logo svg {
      width: 100%; height: 100%;
      filter: drop-shadow(0 0 30px rgba(99, 179, 237, 0.5));
    }

    .progress-wrap {
      width: 180px;
      display: flex; flex-direction: column;
      align-items: center; gap: 12px;
    }

    .progress-bar-track {
      width: 100%; height: 3px;
      background: rgba(255,255,255,0.12);
      border-radius: 100px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #63b3ed, #a78bfa);
      border-radius: 100px;
      width: 0%;
      transition: width 0.3s ease;
    }

    .boot-text {
      color: rgba(255,255,255,0.35);
      font-size: 11px;
      letter-spacing: 0.05em;
      font-weight: 500;
    }

    /* Fade out animation */
    .fade-out {
      animation: fadeOut 0.6s ease forwards;
    }
    @keyframes fadeOut {
      to { opacity: 0; }
    }
  </style>
</head>
<body>

  <div class="logo-container" id="logoContainer">
    <div class="maze-logo">
      <svg viewBox="0 0 96 96" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="48" cy="48" r="46" stroke="white" stroke-width="1.5" stroke-opacity="0.15"/>
        <circle cx="48" cy="48" r="46" stroke="url(#logoGrad)" stroke-width="1.5"
          stroke-dasharray="289" stroke-dashoffset="289"
          style="animation: circleDraw 1.5s ease 0.3s forwards;">
        </circle>
        <!-- M letter -->
        <path d="M26 65V31L48 55L70 31V65" stroke="white" stroke-width="3.5"
          stroke-linecap="round" stroke-linejoin="round" fill="none"
          style="animation: pathDraw 1s ease 0.8s both;
                 stroke-dasharray: 120; stroke-dashoffset: 120;"/>
        <defs>
          <linearGradient id="logoGrad" x1="0" y1="0" x2="96" y2="96" gradientUnits="userSpaceOnUse">
            <stop stop-color="#63b3ed"/>
            <stop offset="1" stop-color="#a78bfa"/>
          </linearGradient>
        </defs>
      </svg>
    </div>

    <div class="progress-wrap">
      <div class="progress-bar-track">
        <div class="progress-bar-fill" id="progressFill"></div>
      </div>
      <span class="boot-text" id="bootText">Starting Maze…</span>
    </div>
  </div>

  <style>
    @keyframes circleDraw {
      to { stroke-dashoffset: 0; }
    }
    @keyframes pathDraw {
      to { stroke-dashoffset: 0; }
    }
  </style>

  <script>
    const { ipcRenderer } = require('electron');

    const fill = document.getElementById('progressFill');
    const text = document.getElementById('bootText');
    const container = document.getElementById('logoContainer');

    const stages = [
      { pct: 15, label: 'Loading kernel…', delay: 400 },
      { pct: 35, label: 'Mounting volumes…', delay: 700 },
      { pct: 55, label: 'Starting services…', delay: 800 },
      { pct: 72, label: 'Loading Maze…', delay: 700 },
      { pct: 88, label: 'Preparing desktop…', delay: 600 },
      { pct: 100, label: 'Welcome to Maze', delay: 400 },
    ];

    let i = 0;
    function nextStage() {
      if (i >= stages.length) {
        setTimeout(() => {
          container.classList.add('fade-out');
          setTimeout(() => ipcRenderer.send('boot-complete'), 650);
        }, 300);
        return;
      }
      const s = stages[i++];
      fill.style.width = s.pct + '%';
      text.textContent = s.label;
      setTimeout(nextStage, s.delay);
    }

    setTimeout(nextStage, 800);
  </script>
</body>
</html>
